name: 比较 OpenWRT Makefile 版本号

on:
  push:
    branches:
      - main  # 或者你希望触发的其他分支
  pull_request:
    branches:
      - main  # 或者你希望触发的其他分支

jobs:
  compare_versions:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v2

      - name: 设置 Git
        run: |
          git fetch --all

      - name: 比较 Makefile 版本号
        run: |
          # 设置分支名称
          BRANCH1="openwrt-21.02"
          BRANCH2="openwrt-24.10"
          
          # 克隆 ImmortalWrt 仓库
          git clone https://github.com/immortalwrt/packages.git
          cd packages

          # 拉取远程的 openwrt-21.02 和 openwrt-24.10 分支
          git fetch origin
          git checkout "$BRANCH1"
          git pull origin "$BRANCH1"
          git checkout "$BRANCH2"
          git pull origin "$BRANCH2"

          # 获取两个分支中 Makefile 文件的差异
          makefiles=$(git diff --name-only "$BRANCH1".."$BRANCH2" -- **/Makefile)

          # 遍历每个 Makefile 文件并比较版本号
          for makefile in $makefiles; do
            echo "-------------------------------------------------"
            echo "正在比较 $makefile:"

            # 提取 openwrt-21.02 分支的版本号
            version1=$(git show "$BRANCH1:$makefile" | grep -oP "(?<=^VERSION\s*=\s*)\S+")
            
            # 提取 openwrt-24.10 分支的版本号
            version2=$(git show "$BRANCH2:$makefile" | grep -oP "(?<=^VERSION\s*=\s*)\S+")

            echo "$BRANCH1 分支的版本号: $version1"
            echo "$BRANCH2 分支的版本号: $version2"

            # 比较版本号
            if [ "$version1" != "$version2" ]; then
              echo "版本号不同!"
            else
              echo "版本号相同!"
            fi
            echo "-------------------------------------------------"
          done
