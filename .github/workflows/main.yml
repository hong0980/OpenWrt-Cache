name: 比较 OpenWRT Makefile 版本号并生成报告

on:
  push:
    branches:
      - master  # 或者你希望触发的其他分支
  pull_request:
    branches:
      - master  # 或者你希望触发的其他分支

jobs:
  compare_versions:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v2

      - name: 设置 Git
        run: |
          git fetch --all

      - name: 比较 Makefile 版本号
        run: |
          # 设置分支名称
          BRANCH1="openwrt-21.02"
          BRANCH2="openwrt-24.10"
          
          # 克隆 ImmortalWrt 仓库
          git clone https://github.com/immortalwrt/packages
          cd packages

          # 拉取远程的 openwrt-21.02 和 openwrt-24.10 分支
          git fetch origin
          git checkout "$BRANCH1"
          git pull origin "$BRANCH1"
          git checkout "$BRANCH2"
          git pull origin "$BRANCH2"

          # 获取两个分支中所有 Makefile 文件的差异
          makefiles=$(git diff --name-only "$BRANCH1".."$BRANCH2" -- '**/Makefile')

          # 如果没有找到任何 Makefile 文件差异，退出
          if [ -z "$makefiles" ]; then
            echo "没有找到 Makefile 文件的差异" | tee comparison_report.txt
            exit 0
          fi

          # 创建报告文件并输出到控制台
          echo "OpenWRT Makefile 版本号比较报告" | tee comparison_report.txt
          echo "=====================================" | tee -a comparison_report.txt

          # 遍历每个 Makefile 文件并比较版本号
          for makefile in $makefiles; do
            echo "-------------------------------------------------" | tee -a comparison_report.txt
            echo "正在比较 $makefile:" | tee -a comparison_report.txt

            # 获取 Makefile 所在目录的上一级目录名
            package_name=$(dirname "$makefile" | xargs basename)

            echo "包名: $package_name" | tee -a comparison_report.txt

            # 提取 openwrt-21.02 分支的版本号
            version1=$(git show "$BRANCH1:$makefile" 2>/dev/null | sed -En 's/^PKG_VERSION:[=](.*)/\1/p' 2>/dev/null)

            # 提取 openwrt-24.10 分支的版本号
            version2=$(git show "$BRANCH2:$makefile" 2>/dev/null | sed -En 's/^PKG_VERSION:[=](.*)/\1/p' 2>/dev/null)

            echo "$BRANCH1 分支的版本号: ${version1:-不存在}" | tee -a comparison_report.txt
            echo "$BRANCH2 分支的版本号: ${version2:-不存在}" | tee -a comparison_report.txt

            # 比较版本号
            if [ "$version1" != "$version2" ]; then
              echo "$package_name 包的版本号不同!" | tee -a comparison_report.txt
            else
              echo "$package_name 包的版本号相同!" | tee -a comparison_report.txt
            fi
            echo "-------------------------------------------------" | tee -a comparison_report.txt
          done

      - name: 创建 GitHub Release 并上传报告
        uses: softprops/action-gh-release@v1
        with:
          files: comparison_report.txt
          token: ${{secrets.GITHUB_TOKEN}}
          body: immortalwrt/packages
          tag_name: immortalwrt/packages
          name: immortalwrt/packages
