name: 版本比较

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'Git 仓库地址'
        required: true
        type: choice
        default: 'immortalwrt/packages'
        options: [ immortalwrt/packages, immortalwrt/luci ]

      branch1:
        description: '第一个分支名称'
        required: true
        type: choice
        default: 'openwrt-21.02'
        options: [ openwrt-21.02, openwrt-23.05, openwrt-24.10, master, openwrt-18.06-k5.4, openwrt-18.06 ]

      branch2:
        description: '第二个分支名称'
        required: true
        type: choice
        default: 'openwrt-24.10'
        options: [ openwrt-21.02, openwrt-23.05, openwrt-24.10, master, openwrt-18.06-k5.4, openwrt-18.06 ]

jobs:
  compare_versions:
    runs-on: ubuntu-24.04
    name: ${{github.event.inputs.repo_url}} ${{github.event.inputs.branch1}} ${{github.event.inputs.branch2}} 版本比较
    permissions:
      contents: write

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v2

      - name: 设置 Git
        run: |
          git fetch --all

      - name: 比较 Makefile 版本号
        run: |
          mkdir output
          REPO_URL="${{ github.event.inputs.repo_url }}"
          BRANCH1="${{ github.event.inputs.branch1 }}"
          BRANCH2="${{ github.event.inputs.branch2 }}"
          
          # 克隆用户指定的仓库
          repo_url="https://github.com/$REPO_URL"
          git clone -q "$repo_url"
          REPO_NAME=$(basename "$repo_url" .git)
          cd "$REPO_NAME"

          # 拉取远程的分支
          git fetch -q origin
          git checkout -q "$BRANCH1"
          git pull -q origin "$BRANCH1"
          git checkout -q "$BRANCH2"
          git pull -q origin "$BRANCH2"
          REPO_URL=$(echo $REPO_URL | sed 's|/|-|g')
          
          # 创建报告文件并输出到控制台
          echo "$REPO_URL $BRANCH1 $BRANCH2 版本号比较" | tee $REPO_URL-comparison.txt
          echo "=====================================" | tee -a $REPO_URL-comparison.txt

          # 获取两个分支中所有 Makefile 文件的差异
          makefiles=$(git diff --name-only "$BRANCH1".."$BRANCH2" -- '**/Makefile')
          for makefile in $makefiles; do

            # 获取 Makefile 所在目录的上一级目录名
            package_name=$(dirname "$makefile")

            # 提取第一个分支的版本号
            version1=$(git show "$BRANCH1:$makefile" 2>/dev/null | sed -En 's/^(PKG_REALVERSION|PKG_VERSION):=(.*)/\2/p' | head -n 1)

            # 提取第二个分支的版本号
            version2=$(git show "$BRANCH2:$makefile" 2>/dev/null | sed -En 's/^(PKG_REALVERSION|PKG_VERSION):=(.*)/\2/p' | head -n 1)

            # 如果版本号包含 '$(' 或 ')', 则清空版本号
            [[ "$version1" =~ \$\(.*\) ]] && version1=""
            [[ "$version2" =~ \$\(.*\) ]] && version2=""

            # 比较版本号
            if [ "$version1" != "$version2" ]; then
              echo "-------------------------------------------------" | tee -a $REPO_URL-comparison.txt
              echo "包名: $package_name" | tee -a $REPO_URL-comparison.txt
              echo "$BRANCH1 分支的版本号: ${version1:-不存在}" | tee -a $REPO_URL-comparison.txt
              echo "$BRANCH2 分支的版本号: ${version2:-不存在}" | tee -a $REPO_URL-comparison.txt
              echo "-------------------------------------------------" | tee -a $REPO_URL-comparison.txt
              echo
            fi
          done
          echo "=====================================" | tee -a $REPO_URL-comparison.txt
          cp $REPO_URL-comparison.txt ../output

      - name: 创建 GitHub Release 并上传报告
        uses: softprops/action-gh-release@v2.2.1
        with:
          files: output/*
          name: 比较版本
          tag_name: comparison
          token: ${{secrets.GITHUB_TOKEN}}
